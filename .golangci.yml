run:
  timeout: 5m
  modules-download-mode: readonly

output:
  formats:
    - format: colored-line-number
  sort-results: true

linters:
  enable:
    # バグ検出
    - bodyclose
    - durationcheck
    - errcheck
    - exportloopref
    - govet
    - nilerr
    - noctx
    - rowserrcheck
    - sqlclosecheck
    - staticcheck
    - typecheck

    # スタイル・可読性
    - errname
    - gofumpt
    - goimports
    - goconst
    - gocritic
    - gosimple
    - misspell
    - nakedret
    - prealloc
    - predeclared
    - revive
    - stylecheck
    - unconvert
    - unparam
    - unused
    - whitespace

    # セキュリティ
    - gosec

    # パフォーマンス
    - ineffassign

    # 複雑度
    - cyclop
    - gocognit
    - nestif

    # テスト
    - tenv
    - tparallel

linters-settings:
  cyclop:
    max-complexity: 15

  gocognit:
    min-complexity: 20

  goconst:
    min-len: 3
    min-occurrences: 3

  gocritic:
    enabled-tags:
      - diagnostic
      - experimental
      - opinionated
      - performance
      - style
    disabled-checks:
      - whyNoLint

  errcheck:
    check-type-assertions: true
    check-blank: true

  gofumpt:
    extra-rules: true

  govet:
    enable-all: true

  nakedret:
    max-func-lines: 10

  nestif:
    min-complexity: 5

  revive:
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: context-keys-type
      - name: dot-imports
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: exported
      - name: increment-decrement
      - name: indent-error-flow
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: var-declaration
      - name: var-naming

  gosec:
    excludes:
      - G104  # errcheck がカバー

  stylecheck:
    checks:
      - all

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
  exclude-rules:
    - path: _test\.go
      linters:
        - goconst
        - gocritic
        - errcheck
        - gosec
    - path: cmd/
      linters:
        - gocognit
        - cyclop
